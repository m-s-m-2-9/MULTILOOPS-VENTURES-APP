<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiloops Ventures</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e11; --surface: #1e2329; --primary: #00b14f;
            --text-main: #eaecef; --text-dim: #848e9c; --border: #2b3139;
            --accent: #fcd535; /* Gold for ratings/wallet */
        }
        [data-theme="light"] {
            --bg: #f4f6f8; --surface: #ffffff; --primary: #00b14f;
            --text-main: #1e2329; --text-dim: #707a8a; --border: #eaecef;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); transition: 0.3s; padding-bottom: 80px; overflow-x: hidden; }

        /* SIDEBAR & SETTINGS */
        #sidebar {
            position: fixed; left: -100%; top: 0; width: 85%; height: 100%;
            background: var(--surface); z-index: 1000; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            padding: 25px; border-right: 1px solid var(--border);
        }
        #sidebar.open { left: 0; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 999; backdrop-filter: blur(4px); }

        /* ITEM CARD (BLINKIT STYLE) */
        .item-card {
            background: var(--surface); border-radius: 12px; padding: 10px;
            position: relative; border: 1px solid var(--border);
        }
        .item-img-container {
            width: 100%; aspect-ratio: 1/1; background: var(--bg);
            border-radius: 8px; position: relative; overflow: hidden;
        }
        .rating-badge {
            position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.6);
            color: var(--accent); font-size: 10px; padding: 2px 6px; border-radius: 4px;
            font-weight: 800; backdrop-filter: blur(2px);
        }
        .add-btn {
            position: absolute; bottom: -10px; right: 10px;
            background: var(--primary); color: white; border: none;
            width: 32px; height: 32px; border-radius: 8px; font-weight: 900;
            box-shadow: 0 4px 10px rgba(0,177,79,0.3); cursor: pointer;
        }

        /* WALLET CARD */
        .wallet-card {
            background: linear-gradient(135deg, var(--primary), #008f3e);
            margin: 15px; padding: 20px; border-radius: 20px; color: white;
            box-shadow: 0 10px 20px rgba(0,177,79,0.2);
        }

        /* TOGGLE SWITCH (PREMIUM) */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; inset: 0; background: #ccc; 
            transition: .4s; border-radius: 24px; 
        }
        input:checked + .slider { background: var(--primary); }
        .slider:before { 
            position: absolute; content: ""; height: 18px; width: 18px; 
            left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider:before { transform: translateX(20px); }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--surface); display: flex; align-items: center;
            justify-content: space-around; border-top: 1px solid var(--border); z-index: 100;
        }
        .nav-link { color: var(--text-dim); text-decoration: none; font-size: 10px; font-weight: 700; text-align: center; }
        .nav-link.active { color: var(--primary); }
    </style>
</head>
<body data-theme="dark">

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <h2 style="margin-bottom: 25px;">Settings</h2>
        
        <div style="background: var(--bg); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span>Master Mute</span>
                <label class="switch"><input type="checkbox" id="masterMute"><span class="slider"></span></label>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>Dark Mode</span>
                <label class="switch"><input type="checkbox" checked onchange="toggleTheme(this)"><span class="slider"></span></label>
            </div>
        </div>

        <p style="color: var(--text-dim); font-size: 12px; margin-bottom: 10px;">NOTIFICATIONS</p>
        <div style="font-size: 14px; line-height: 2.5;">
            <p>Transactional Alerts</p>
            <p>Offers & Discounts</p>
            <p>Order Updates</p>
        </div>
        
        <button class="btn-primary" style="background: #ff4d4d; margin-top: 40px;" onclick="logout()">Log Out</button>
    </div>

    <div id="homeScreen" class="screen active">
        <div style="padding: 15px; display: flex; justify-content: space-between; align-items: center; background: var(--bg); position: sticky; top: 0; z-index: 90;">
            <button onclick="toggleSidebar()" style="background:none; border:none; color:var(--text-main); font-size:24px;">≡</button>
            <div style="text-align: center;">
                <p style="font-size: 10px; color: var(--text-dim);">DELIVERING TO</p>
                <p style="font-size: 14px; font-weight: 800;">Home, Sector 29 ▼</p>
            </div>
            <div style="width: 24px; height: 24px; background: var(--surface); border-radius: 50%; border: 1px solid var(--primary);"></div>
        </div>

        <div style="padding: 0 15px 15px;">
            <input type="text" placeholder="Search 'Loopy Packs'..." style="width:100%; padding:14px; border-radius:12px; border:1px solid var(--border); background:var(--surface); color:white;">
        </div>

        <div class="wallet-card">
            <p style="font-size: 12px; opacity: 0.8;">Loopy Wallet Balance</p>
            <h1 style="margin: 5px 0;">₹1,450.00</h1>
            <button style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700;" onclick="showScreen('walletScreen')">Add Money via UPI +</button>
        </div>

        <div style="display: flex; overflow-x: auto; padding: 10px 15px; gap: 10px;" id="catBar">
            <div style="flex: 0 0 45%; background: var(--surface); padding: 20px; border-radius: 12px; text-align: center;">Ventures</div>
            <div style="flex: 0 0 45%; background: var(--surface); padding: 20px; border-radius: 12px; text-align: center;">Loops</div>
            <button style="flex: 0 0 40%; background: var(--primary); border:none; color:white; border-radius:12px; font-weight:800;">Show All</button>
        </div>

        <div style="padding: 15px;">
            <h3 style="margin-bottom: 15px;">Recommended for You</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;" id="itemGrid">
                </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-link active">HOME</div>
        <div class="nav-link">CATEGORIES</div>
        <div class="nav-link">WALLET</div>
        <div class="nav-link">CART</div>
        <div class="nav-link">PROFILE</div>
    </nav>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('open');
            overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        }

        function toggleTheme(cb) {
            document.body.setAttribute('data-theme', cb.checked ? 'dark' : 'light');
        }

        function renderItems() {
            const items = [
                { name: "Fast Loop Pro", price: "₹299", rating: "4.8 ★" },
                { name: "Venture Pack", price: "₹1,499", rating: "4.9 ★" },
                { name: "Global Loop", price: "₹599", rating: "4.7 ★" },
                { name: "Starter Kit", price: "₹149", rating: "4.5 ★" }
            ];
            const grid = document.getElementById('itemGrid');
            grid.innerHTML = items.map(item => `
                <div class="item-card">
                    <div class="item-img-container">
                        <div class="rating-badge">${item.rating}</div>
                    </div>
                    <p style="font-size:12px; font-weight:700; margin-top:10px;">${item.name}</p>
                    <p style="color:var(--primary); font-weight:800;">${item.price}</p>
                    <button class="add-btn">+</button>
                </div>
            `).join('');
        }

        renderItems();
    </script>
</body>
</html>
